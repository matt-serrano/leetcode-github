<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CodeNebula</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="header">
    <div class="brand">
      <img src="assets/icon-32.png" alt="" class="brand-icon">
      <div class="brand-copy">
        <h1>CodeNebula</h1>
        <span>Your solution library</span>
      </div>
    </div>
    <div class="header-controls">
      <label class="switch" title="Toggle automatic detection">
        <input type="checkbox" id="toggleDetection" checked>
        <span class="slider round" aria-hidden="true"></span>
        <span class="sr-only">Automatic detection</span>
      </label>
      <button id="settingsBtn" type="button" title="Settings" aria-label="Open settings">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06-1.42 1.42-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V20h-2v-.08A1.7 1.7 0 0 0 12.35 18a1.7 1.7 0 0 0-1.88.34l-.06.06L9 16.98l.06-.06A1.7 1.7 0 0 0 9.4 15a1.7 1.7 0 0 0-1.56-1.03H7.8v-2h.08A1.7 1.7 0 0 0 9.4 11a1.7 1.7 0 0 0-.34-1.88L9 9.06 10.42 7.64l.06.06A1.7 1.7 0 0 0 12.36 8a1.7 1.7 0 0 0 1.03-1.56V6.4h2v.08A1.7 1.7 0 0 0 16.45 8a1.7 1.7 0 0 0 1.88-.34l.06-.06L19.8 9l-.06.06A1.7 1.7 0 0 0 19.4 11a1.7 1.7 0 0 0 1.56 1.03H21v2h-.08A1.7 1.7 0 0 0 19.4 15Z"/></svg>
      </button>
    </div>
  </div>

  <div id="homepageView" class="view active">
    <div class="toolbar">
      <div class="search-field">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6.5"/><path d="m16 16 4 4"/></svg>
        <input type="search" id="searchInput" placeholder="Search solutions" aria-label="Search solutions">
      </div>
      <select id="sortSelect">
        <option value="dateDesc">Newest First</option>
        <option value="dateAsc">Oldest First</option>
        <option value="difficulty">Difficulty</option>
        <option value="number">Problem Number</option>
      </select>
    </div>
    <div class="list-heading">
      <span>Recent solutions</span>
      <span id="problemCount" aria-live="polite"></span>
    </div>
    <div id="problemList">
      <!-- Problem items injected here -->
      <div class="empty-state">No problems synced yet. Go solve some on LeetCode!</div>
    </div>
  </div>

  <div id="settingsView" class="view">
    <h2>Settings</h2>
    <div class="form-group">
      <label for="ghToken">GitHub Personal Access Token</label>
      <input type="password" id="ghToken" placeholder="ghp_xxxxxxxx">
      <small>Requires 'Contents: read/write' permission.</small>
    </div>
    <div class="form-group">
      <label for="ghRepo">Repository (owner/repo)</label>
      <input type="text" id="ghRepo" placeholder="username/leetcode-solutions">
    </div>
    <div class="form-group">
      <label for="ghBranch">Branch</label>
      <input type="text" id="ghBranch" placeholder="main" value="main">
    </div>
    <div class="settings-actions">
      <button id="saveSettingsBtn" class="primary-btn">Save</button>
      <button id="cancelSettingsBtn" class="secondary-btn">Cancel</button>
    </div>
    <div id="settingsStatus"></div>
  </div>

  <div id="deleteModalView" class="view">
    <div class="delete-panel">
      <div class="delete-hero">
        <div class="delete-icon" aria-hidden="true">!</div>
        <div>
          <h2>Delete Solution</h2>
          <p>Choose what to remove from your GitHub repository.</p>
        </div>
      </div>
      <div id="deleteModalContent">
        <div class="delete-loading">Loading solutions from GitHub...</div>
      </div>
    </div>
    <div class="settings-actions delete-actions">
      <button id="cancelDeleteBtn" class="secondary-btn">Cancel</button>
      <button id="confirmDeleteBtn" class="primary-btn danger-btn" disabled>Delete</button>
    </div>
    <div id="deleteStatus" class="settingsStatus"></div>
  </div>

  <div id="notesView" class="view">
    <div class="toolbar" style="margin-bottom: 12px;">
      <button id="backFromNotesBtn" class="secondary-btn icon-btn" style="flex: 0 0 auto;" title="Back" aria-label="Back">&larr;</button>
      <h2 id="notesProblemTitle" style="margin: 0; font-size: 15px; display: flex; align-items: center; margin-left: 8px;">Problem Notes</h2>
    </div>
    
    <div id="codeContainer" class="code-container" style="display: none;">
      <div class="code-header">
        <span id="codeLanguage" class="code-language"></span>
      </div>
      <pre id="codeScroller"><code id="codeBlock"></code></pre>
    </div>

    <div class="notes-header">Notes</div>
    <div id="notesContent" class="notes-content"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
